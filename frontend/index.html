<!DOCTYPE html>
<html>
<head>
  <title>Food App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      color: white;
      align-items: center;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
    }

    .header button {
      padding: 8px 15px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }

    .login-btn {
      background: black;
      color: white;
    }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #ff5200, #ff7a00);
      color: white;
      padding: 40px;
      text-align: center;
    }

    .hero h1 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .search-box {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .search-box input {
      padding: 12px;
      width: 250px;
      border-radius: 10px;
      border: none;
    }

    /* CARDS */
    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 30px;
      flex-wrap: wrap;
    }

    .card {
      background: #f5f5f5;
      width: 280px;
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #ff5200;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- HEADER -->
<header style="display:flex; align-items:center; justify-content:center; gap:10px;">
  <img src="logo.png" width="70" style="vertical-align: middle;">
    <span>Food Ordering App</span>
</header>

    <div id="loginBtn">
  <button onclick="goLogin()">Sign In</button>
</div>
  </div>

  <h1>Order food & groceries. Discover best restaurants.</h1>

  <div class="search-box">
    <input type="text" placeholder="Search food...">
  </div>

</div>

<div id="userSection" style="display:none;">
  <h3>Welcome, <span id="username"></span> 👋</h3>
  <button onclick="logout()">Logout</button>
</div>

<!-- CARDS -->
<div class="cards">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
    <h3>Food Delivery</h3>
    <p>Upto 60% OFF</p>
    <button class="btn" onclick="goApp()">Explore</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542838132-92c53300491e">
    <h3>Groceries</h3>
    <p>Instant delivery</p>
    <button class="btn">Coming Soon</button>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5">
    <h3>Dineout</h3>
    <p>Save more</p>
    <button class="btn">Coming Soon</button>
  </div>

</div>

<script>
function goLogin() {
  window.location.href = "login.html";
}

function goApp() {
  const user = JSON.parse(localStorage.getItem("user"));

  if (!user) {
    alert("Login first ❌");
    window.location.href = "login.html";
    return;
  }

  window.location.href = "home.html"; // food page
}
</script>

</body>
</html>
